{% extends "base_marketing.html" %}

{% block title %}Page Not Found — Triage Counsel{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-16 text-center fade-in">
    <p class="text-6xl font-extrabold text-gray-200 mb-4">404</p>
    <h1 class="text-2xl font-extrabold text-[#0F172A] tracking-tight mb-3">Page not found</h1>
    <p class="text-gray-500 mb-8">The page you're looking for doesn't exist or has been moved.</p>
    <div class="flex items-center justify-center gap-4 flex-wrap">
        <a href="/" class="btn-primary py-2.5 px-6 rounded-lg text-sm">Return Home</a>
        {% if user %}
        <a href="/dashboard" class="btn-secondary py-2.5 px-6 rounded-lg text-sm">Go to Dashboard</a>
        {% endif %}
        <a href="/contact" class="btn-secondary py-2.5 px-6 rounded-lg text-sm">Contact Support</a>
    </div>
</section>
{% endblock %}
